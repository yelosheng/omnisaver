{% extends "base.html" %}

{% block title %}Change Password - OmniSaver{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-5 mx-auto">
        <h2 class="mb-4"><i class="bi bi-key"></i> {{ t.password_title }}</h2>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="current_password" class="form-label">{{ t.password_current }}</label>
                        <input type="password" class="form-control" id="current_password"
                               name="current_password" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="new_password" class="form-label">{{ t.password_new }}</label>
                        <input type="password" class="form-control" id="new_password"
                               name="new_password" required>
                    </div>
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">{{ t.password_confirm }}</label>
                        <input type="password" class="form-control" id="confirm_password"
                               name="confirm_password" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> {{ t.password_submit }}
                        </button>
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">{{ t.password_cancel }}</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
