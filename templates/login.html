<!DOCTYPE html>
<html lang="{{ 'zh-CN' if current_lang == 'zh_CN' else 'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OmniSaver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f7f6f3;
            background-image: radial-gradient(circle, #e0ddd6 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: #fefefe;
            border-radius: 8px;
            border: 1px solid #e2ddd6;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #1a1a1a;
            font-size: 22px;
            font-weight: 700;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #8a8278;
            font-size: 14px;
        }

        .form-floating {
            margin-bottom: 20px;
            position: relative;
        }

        .form-control {
            border: 1px solid #d4cfc8;
            border-radius: 6px;
            padding: 12px 15px;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            border-color: #7c5c3e;
            box-shadow: none;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #7c5c3e;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #6a4f35;
        }

        .btn-login:active {
            background: #5a4229;
        }

        .alert {
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            z-index: 10;
        }

        .password-toggle:hover {
            color: #7c5c3e;
        }

    </style>
</head>
<body>
<!-- Language switcher -->
<div style="position:fixed;top:16px;right:16px;z-index:1000;">
    <div class="dropdown">
        <button class="btn btn-sm" type="button" data-bs-toggle="dropdown"
                style="background:transparent;color:#8a8278;border:1px solid #d4cfc8;">
            🌐 {% if current_lang == 'zh_CN' %}中文{% else %}EN{% endif %}
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
            <li>
                <a class="dropdown-item {% if current_lang == 'en' %}active{% endif %}"
                   href="{{ url_for('set_language', lang='en', next='/login') }}">
                    {{ t.lang_en }}
                </a>
            </li>
            <li>
                <a class="dropdown-item {% if current_lang == 'zh_CN' %}active{% endif %}"
                   href="{{ url_for('set_language', lang='zh_CN', next='/login') }}">
                    {{ t.lang_zh_CN }}
                </a>
            </li>
        </ul>
    </div>
</div>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>OmniSaver</h1>
                <p>{{ t.login_tagline }}</p>
            </div>

            {% if error %}
            <div class="alert alert-danger" role="alert">
                <i class="bi bi-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-floating">
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="{{ t.login_username }}" required autofocus>
                    <label for="username"><i class="bi bi-person"></i> {{ t.login_username }}</label>
                </div>

                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="{{ t.login_password }}" required>
                    <label for="password"><i class="bi bi-lock"></i> {{ t.login_password }}</label>
                    <span class="password-toggle" onclick="togglePassword()">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </span>
                </div>

                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember_me" name="remember_days" value="30">
                        <label class="form-check-label text-secondary" for="remember_me" style="font-size:14px;">{{ t.login_remember_me }}</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-login">
                    <i class="bi bi-box-arrow-in-right"></i> {{ t.login_submit }}
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.className = 'bi bi-eye-slash';
            } else {
                passwordInput.type = 'password';
                toggleIcon.className = 'bi bi-eye';
            }
        }
    </script>
</body>
</html>
