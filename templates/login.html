<!DOCTYPE html>
<html lang="{{ 'zh-CN' if current_lang == 'zh_CN' else 'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OmniSaver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <style>
        :root {
            --accent: #7c5c3e;
            --accent-hover: #6a4f35;
            --accent-active: #5a4229;
        }

        body {
            background-color: #f7f6f3;
            background-image: radial-gradient(circle, #e0ddd6 1px, transparent 1px);
            background-size: 20px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: #fefefe;
            border-radius: 8px;
            border: 1px solid #e2ddd6;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #1a1a1a;
            font-size: 22px;
            font-weight: 700;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #8a8278;
            font-size: 14px;
        }

        .form-floating {
            margin-bottom: 20px;
            position: relative;
        }

        .form-control {
            border: 1px solid #d4cfc8;
            border-radius: 6px;
            padding: 12px 15px;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: none;
        }

        .form-check-input:checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: var(--accent-hover);
        }

        .btn-login:active {
            background: var(--accent-active);
        }

        .alert {
            border-radius: 8px;
            border: none;
            margin-bottom: 20px;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            z-index: 10;
        }

        .password-toggle:hover {
            color: var(--accent);
        }

        /* 色板 */
        .color-picker {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 18px;
        }

        .swatch {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            padding: 0;
            transition: transform 0.15s;
            outline: none;
        }

        .swatch:hover {
            transform: scale(1.25);
        }

        .swatch.active {
            outline: 2px solid #f7f6f3;
            outline-offset: 1px;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.25);
            transform: scale(1.15);
        }
    </style>
    <script>
        // 在 CSS 加载前立即恢复颜色，避免闪烁
        (function() {
            var themes = {
                brown:     ['#7c5c3e','#6a4f35','#5a4229'],
                slate:     ['#4a6278','#3d5468','#304658'],
                green:     ['#4a6741','#3d5836','#30472a'],
                rose:      ['#8b5e6a','#77505a','#62424a'],
                olive:     ['#6b7040','#5a5e36','#494c2b'],
                indigo:    ['#5b5ea6','#4d508e','#3e4175'],
                purple:    ['#7a5c78','#674e65','#544051'],
                terracotta:['#a05c40','#8a4f37','#73412d'],
            };
            var saved = localStorage.getItem('omni-accent') || 'brown';
            var t = themes[saved] || themes.brown;
            document.documentElement.style.setProperty('--accent', t[0]);
            document.documentElement.style.setProperty('--accent-hover', t[1]);
            document.documentElement.style.setProperty('--accent-active', t[2]);
        })();
    </script>
</head>
<body>
<!-- Language switcher -->
<div style="position:fixed;top:16px;right:16px;z-index:1000;">
    <div class="dropdown">
        <button class="btn btn-sm" type="button" data-bs-toggle="dropdown"
                style="background:transparent;color:#8a8278;border:1px solid #d4cfc8;">
            🌐 {% if current_lang == 'zh_CN' %}中文{% else %}EN{% endif %}
        </button>
        <ul class="dropdown-menu dropdown-menu-end">
            <li>
                <a class="dropdown-item {% if current_lang == 'en' %}active{% endif %}"
                   href="{{ url_for('set_language', lang='en', next='/login') }}">
                    {{ t.lang_en }}
                </a>
            </li>
            <li>
                <a class="dropdown-item {% if current_lang == 'zh_CN' %}active{% endif %}"
                   href="{{ url_for('set_language', lang='zh_CN', next='/login') }}">
                    {{ t.lang_zh_CN }}
                </a>
            </li>
        </ul>
    </div>
</div>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="{{ url_for('static', filename='icon-128.png') }}" alt="OmniSaver" height="72" style="margin-bottom: 12px;">
                <h1>OmniSaver</h1>
                <p>{{ t.login_tagline }}</p>
            </div>

            {% if error %}
            <div class="alert alert-danger" role="alert">
                <i class="bi bi-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-floating">
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="{{ t.login_username }}" required autofocus>
                    <label for="username"><i class="bi bi-person"></i> {{ t.login_username }}</label>
                </div>

                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="{{ t.login_password }}" required>
                    <label for="password"><i class="bi bi-lock"></i> {{ t.login_password }}</label>
                    <span class="password-toggle" onclick="togglePassword()">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </span>
                </div>

                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember_me" name="remember_days" value="365">
                        <label class="form-check-label text-secondary" for="remember_me" style="font-size:14px;">{{ t.login_remember_me }}</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-login">
                    <i class="bi bi-box-arrow-in-right"></i> {{ t.login_submit }}
                </button>
            </form>
        </div>

        <!-- 色板选择器 -->
        <div class="color-picker" id="colorPicker">
            <button class="swatch" data-key="brown"      style="background:#7c5c3e" title="{{ t.color_brown }}"></button>
            <button class="swatch" data-key="terracotta" style="background:#a05c40" title="{{ t.color_terracotta }}"></button>
            <button class="swatch" data-key="rose"       style="background:#8b5e6a" title="{{ t.color_rose }}"></button>
            <button class="swatch" data-key="purple"     style="background:#7a5c78" title="{{ t.color_purple }}"></button>
            <button class="swatch" data-key="indigo"     style="background:#5b5ea6" title="{{ t.color_indigo }}"></button>
            <button class="swatch" data-key="slate"      style="background:#4a6278" title="{{ t.color_slate }}"></button>
            <button class="swatch" data-key="green"      style="background:#4a6741" title="{{ t.color_green }}"></button>
            <button class="swatch" data-key="olive"      style="background:#6b7040" title="{{ t.color_olive }}"></button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        var themes = {
            brown:     ['#7c5c3e','#6a4f35','#5a4229'],
            slate:     ['#4a6278','#3d5468','#304658'],
            green:     ['#4a6741','#3d5836','#30472a'],
            rose:      ['#8b5e6a','#77505a','#62424a'],
            olive:     ['#6b7040','#5a5e36','#494c2b'],
            indigo:    ['#5b5ea6','#4d508e','#3e4175'],
            purple:    ['#7a5c78','#674e65','#544051'],
            terracotta:['#a05c40','#8a4f37','#73412d'],
        };

        function applyTheme(key) {
            var t = themes[key];
            if (!t) return;
            document.documentElement.style.setProperty('--accent', t[0]);
            document.documentElement.style.setProperty('--accent-hover', t[1]);
            document.documentElement.style.setProperty('--accent-active', t[2]);
            localStorage.setItem('omni-accent', key);
            document.querySelectorAll('.swatch').forEach(function(s) {
                s.classList.toggle('active', s.dataset.key === key);
            });
        }

        // 初始化 active 状态
        var current = localStorage.getItem('omni-accent') || 'brown';
        document.querySelectorAll('.swatch').forEach(function(s) {
            s.classList.toggle('active', s.dataset.key === current);
            s.addEventListener('click', function() { applyTheme(this.dataset.key); });
        });

        function togglePassword() {
            var passwordInput = document.getElementById('password');
            var toggleIcon = document.getElementById('toggleIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.className = 'bi bi-eye-slash';
            } else {
                passwordInput.type = 'password';
                toggleIcon.className = 'bi bi-eye';
            }
        }
    </script>
</body>
</html>
