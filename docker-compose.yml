services:
  init:
    image: busybox
    command: >
      sh -c "
        mkdir -p /data/saved_tweets /data/xhs &&
        touch /data/xhs/cookies.json &&
        [ -f /app/config.ini ] || cp /app/config.ini.example /app/config.ini
      "
    volumes:
      - ./docker-data:/data
      - .:/app

  omnisaver:
    image: yelosheng/omnisaver:latest
    # To build locally instead: replace the line above with `build: .`
    ports:
      - "6201:6201"
    volumes:
      # Persistent data: database, users, session key, telegram owner
      - ./docker-data:/data
      # Saved tweets and media
      - ./docker-data/saved_tweets:/app/saved_tweets
      # XHS cookies (shared with xiaohongshu-mcp)
      - ./docker-data/xhs:/root/.agent-reach/xhs
      # mcporter config pointing to xiaohongshu-mcp service
      - ./docker-mcporter.json:/root/.mcporter/mcporter.json:ro
    environment:
      - DATA_DIR=/data
      - SAVE_PATH=/app/saved_tweets
      - PLAYWRIGHT_HEADLESS=true
      # Uncomment to enable HTTPS:
      # - SSL_CERT_PATH=/app/cert.pem
      # - SSL_KEY_PATH=/app/key.pem
    depends_on:
      init:
        condition: service_completed_successfully
      xiaohongshu-mcp:
        condition: service_started
    restart: unless-stopped

  xiaohongshu-mcp:
    image: xpzouying/xiaohongshu-mcp
    ports:
      - "18060:18060"
    volumes:
      # XHS cookies (shared with omnisaver)
      - ./docker-data/xhs/cookies.json:/app/cookies.json
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
