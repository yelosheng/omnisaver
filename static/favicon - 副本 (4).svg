<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <!-- 卡片渐变：增加微弱的光影质感 -->
    <linearGradient id="blackGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#27272A"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>
    <!-- 替换原有的卡片底色：使用紫罗兰色，彻底解决白底隐形问题 -->
    <linearGradient id="purpleCardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <!-- 恢复蓝色药丸的渐变 -->
    <linearGradient id="bluePillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>
    <!-- 文件夹与盒子渐变：增加立体感 -->
    <linearGradient id="folderGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <!-- 新增：边缘专用的更明亮的渐变 -->
    <linearGradient id="rimGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64748B"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <!-- 通用投影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 1. 内部白色文件夹层 -->
  <g>
    <!-- 彩色分类标签 (还原原图细节) -->
    <rect x="12" y="24" width="10" height="6" rx="2" fill="#8B5CF6" />
    <rect x="27" y="24" width="10" height="6" rx="2" fill="#0EA5E9" />
    <rect x="42" y="24" width="10" height="6" rx="2" fill="#10B981" />
    <!-- 文件夹主体 -->
    <rect x="6" y="27" width="52" height="15" rx="2" fill="url(#folderGrad)" />
    <!-- 文件夹内部暗角投影，增加深度 -->
    <rect x="6" y="27" width="52" height="3" fill="#000000" opacity="0.05" />
  </g>

  <!-- 2. 后层卡片 (左侧 X，右侧 Video) -->
  <!-- 左侧：X 图标 (作为通用字母符号/极简线条，相对安全) -->
  <g transform="translate(8, 12) rotate(-12, 9, 14)" filter="url(#shadow)">
    <rect x="0" y="0" width="18" height="28" rx="4" fill="url(#blackGrad)" />
    <line x1="4" y1="8" x2="14" y2="18" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" />
    <line x1="14" y1="8" x2="4" y2="18" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" />
  </g>

  <!-- 右侧：媒体/视频 图标 (紫底卡片 + 蓝色YouTube药丸 + 白色播放键，绝对不用白底！) -->
  <g transform="translate(38, 14) rotate(12, 9, 14)" filter="url(#shadow)">
    <!-- 紫色卡片底色，绝不用白色 -->
    <rect x="0" y="0" width="18" height="28" rx="4" fill="url(#purpleCardGrad)" />
    
    <!-- 蓝色 YouTube 药丸底色 -->
    <rect x="2" y="9" width="14" height="10" rx="3" fill="url(#bluePillGrad)" />
    <!-- 居中的白色大播放键 -->
    <polygon points="7,11.5 12,14 7,16.5" fill="#ffffff" />
  </g>

  <!-- 3. 前层卡片 (中心 Image) -->
  <!-- 中心：图片/图像 -->
  <g transform="translate(21, 5)" filter="url(#shadow)">
    <rect x="0" y="0" width="22" height="34" rx="5" fill="url(#pinkGrad)" />
    <!-- 简化的图片图标 (相框、太阳、山峰) -->
    <rect x="4" y="10" width="14" height="12" rx="2" stroke="#ffffff" stroke-width="2" fill="none" />
    <circle cx="13.5" cy="13.5" r="1.5" fill="#ffffff" />
    <path d="M 4 20 L 8.5 15 L 12.5 19 L 15 16.5 L 18 19.5" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>

  <!-- 4. 正面 3D 档案盒 -->
  <g>
    <!-- 盒子主体 (比顶部边缘稍窄，产生向内收缩的层次感) -->
    <path d="M 4 38 L 60 38 L 60 52 A 8 8 0 0 1 52 60 L 12 60 A 8 8 0 0 1 4 52 Z" fill="url(#boxGrad)" />
    
    <!-- 边缘在盒子主体上投下的微弱阴影 -->
    <path d="M 4 38 L 60 38 L 60 41 L 4 41 Z" fill="#000000" opacity="0.15" />

    <!-- 盒子上方的宽边 / 盖子边缘 (向外扩出) -->
    <rect x="1" y="34" width="62" height="5" rx="1.5" fill="url(#rimGrad)" filter="url(#shadow)" />
    
    <!-- 宽边顶部的一道细高光，增强厚度与塑料/金属质感 -->
    <rect x="1.5" y="34.5" width="61" height="1" rx="0.5" fill="#94A3B8" opacity="0.8" />
    
    <!-- 凹陷的把手 (完美还原你图片中的样式：深色厚边框 + 亮色内嵌把手) -->
    <!-- 深色凹槽外沿 (模拟厚实的深度) -->
    <rect x="21" y="46" width="22" height="8" rx="4" fill="#0F172A" />
    <!-- 亮银色金属把手内芯 -->
    <rect x="24" y="48" width="16" height="4" rx="2" fill="#E2E8F0" />
    <!-- 内芯顶部纯白高光，增强圆润的反光质感 -->
    <rect x="24" y="48" width="16" height="1.5" rx="0.75" fill="#FFFFFF" />
  </g>
</svg>