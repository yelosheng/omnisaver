<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="24" fill="#002147"/>
  <!-- 外圆环 -->
  <circle cx="64" cy="64" r="46" fill="none" stroke="#0288d1" stroke-width="6"/>
  <!-- O 字母变形 - 用缺口圆环暗示"汇聚" -->
  <path d="M64 22 A42 42 0 1 1 63.9 22" fill="none" stroke="#29b6f6" stroke-width="10" stroke-linecap="round"/>
  <!-- 多方向入箭头 （从外部射入圆内） -->
  <g stroke="#e1f5fe" stroke-width="3.5" stroke-linecap="round" fill="none">
    <line x1="64" y1="8" x2="64" y2="18"/>
    <polyline points="59,14 64,8 69,14"/>
    <line x1="106" y1="28" x2="98" y2="36"/>
    <polyline points="107,36 106,28 99,28"/>
    <line x1="116" y1="64" x2="106" y2="64"/>
    <polyline points="110,59 116,64 110,69"/>
    <line x1="22" y1="64" x2="12" y2="64"/>
    <polyline points="18,59 12,64 18,69"/>
  </g>
  <!-- 中心存储图标 -->
  <rect x="50" y="50" width="28" height="28" rx="5" fill="none" stroke="#29b6f6" stroke-width="4"/>
  <line x1="57" y1="59" x2="71" y2="59" stroke="#29b6f6" stroke-width="3"/>
  <line x1="57" y1="65" x2="71" y2="65" stroke="#29b6f6" stroke-width="3"/>
  <line x1="57" y1="71" x2="65" y2="71" stroke="#29b6f6" stroke-width="3"/>
</svg>
