<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="24" fill="#1b1b2f"/>
  <!-- 保险柜门 -->
  <rect x="18" y="18" width="92" height="92" rx="10" fill="none" stroke="#7c4dff" stroke-width="6"/>
  <!-- 圆形转盘 -->
  <circle cx="64" cy="60" r="22" fill="none" stroke="#7c4dff" stroke-width="5"/>
  <circle cx="64" cy="60" r="8" fill="#7c4dff"/>
  <!-- 转盘刻度线 -->
  <line x1="64" y1="35" x2="64" y2="41" stroke="#b39ddb" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="79" x2="64" y2="85" stroke="#b39ddb" stroke-width="3" stroke-linecap="round"/>
  <line x1="39" y1="60" x2="45" y2="60" stroke="#b39ddb" stroke-width="3" stroke-linecap="round"/>
  <line x1="83" y1="60" x2="89" y2="60" stroke="#b39ddb" stroke-width="3" stroke-linecap="round"/>
  <!-- 下载箭头标记 -->
  <line x1="64" y1="92" x2="64" y2="106" stroke="#7c4dff" stroke-width="4" stroke-linecap="round"/>
  <polyline points="56,100 64,108 72,100" fill="none" stroke="#7c4dff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 铰链 -->
  <rect x="100" y="36" width="8" height="10" rx="2" fill="#7c4dff"/>
  <rect x="100" y="82" width="8" height="10" rx="2" fill="#7c4dff"/>
</svg>
