    <rect x="30" y="0" width="160" height="3" fill="#111111" /> <rect x="50" y="0" width="150" height="90" rx="2" fill="url(#brushed-metal)" />
    <rect x="50" y="88" width="150" height="2" fill="#555555" />
    <rect x="50" y="0" width="1.5" height="90" fill="#ffffff" />
    <rect x="155" y="20" width="20" height="50" rx="3" fill="#666666" />
