      <text x="0.5" y="1.5" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="20" fill="none" stroke="#5a5a5a" stroke-width="0.5">HD</text>
    </g>

    <rect x="260" y="285" width="20" height="20" rx="3" fill="#000000" />
    <rect x="260" y="285" width="20" height="2" fill="#111111" />

    <rect x="20" y="285" width="20" height="20" rx="3" fill="#000000" />
    <rect x="22" y="287" width="16" height="8" rx="1.5" fill="#c02a2a" />
    <rect x="22" y="287" width="16" height="2" fill="#ff5555" /> <rect x="25" y="145" width="250" height="175" rx="8" fill="#111111" />
    
