<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 450" width="400" height="450">
  <defs>
    <filter id="drop-shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="8" dy="12" stdDeviation="10" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <linearGradient id="plastic-body" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4a4a" />
      <stop offset="50%" stop-color="#333333" />
      <stop offset="100%" stop-color="#1a1a1a" />
    </linearGradient>

    <linearGradient id="brushed-metal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b0b0b0" />
      <stop offset="15%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#a0a0a0" />
      <stop offset="50%" stop-color="#e0e0e0" />
      <stop offset="80%" stop-color="#888888" />
      <stop offset="100%" stop-color="#cccccc" />
    </linearGradient>

    <linearGradient id="label-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdfdfd" />
      <stop offset="100%" stop-color="#e6e6e6" />
    </linearGradient>
    
    <linearGradient id="label-header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3c72" />
      <stop offset="100%" stop-color="#2a5298" />
